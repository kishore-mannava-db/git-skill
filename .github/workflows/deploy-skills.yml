name: Deploy Skills to Databricks

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - '.assistant/**'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Deploy skills as Git folder
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          USER_NAME=$(databricks current-user me --output json | python3 -c "import sys,json; print(json.load(sys.stdin)['userName'])")
          REPO_URL="${{ github.server_url }}/${{ github.repository }}.git"
          FOLDER_PATH="/Users/$USER_NAME/.assistant/skills/${{ github.event.repository.name }}"

          echo "User: $USER_NAME"
          echo "Repo: $REPO_URL"
          echo "Target: $FOLDER_PATH"

          # Check if Git folder already exists
          REPO_ID=$(databricks repos list --output json | python3 -c "
          import sys, json
          for r in json.load(sys.stdin):
              if r.get('path','') == '$FOLDER_PATH':
                  print(r['id'])
                  break
          " 2>/dev/null || echo "")

          if [ -n "$REPO_ID" ]; then
            echo "Updating existing Git folder (id: $REPO_ID)..."
            databricks repos update "$REPO_ID" --branch main
          else
            echo "Creating Git folder..."
            databricks workspace mkdirs "/Users/$USER_NAME/.assistant/skills"
            databricks repos create "$REPO_URL" gitHub --path "$FOLDER_PATH"
          fi

          echo "Deployed:"
          databricks workspace list "/Users/$USER_NAME/.assistant/skills"
